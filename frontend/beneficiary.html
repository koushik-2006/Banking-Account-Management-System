<!DOCTYPE html>
<html lang="en">

<head>

    <link rel="stylesheet" href="css/style.css">

</head>

<body class="dashboard-body">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="index.html" class="logo-container" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
  <div style="width:38px;height:38px;border-radius:9px;background:#C9A84C;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect x="2" y="14" width="4" height="6" rx="1" fill="#0A0A0A"/>
      <rect x="9" y="9" width="4" height="11" rx="1" fill="#0A0A0A"/>
      <rect x="16" y="4" width="4" height="16" rx="1" fill="#0A0A0A"/>
      <rect x="2" y="13" width="18" height="1.5" rx="0.5" fill="#0A0A0A" opacity="0.4"/>
    </svg>
  </div>
  <span style="font-size:21px;font-weight:700;font-family:'Georgia',serif;letter-spacing:0.5px;color:#C9A84C;line-height:1;">Easy <span style="color:#FFD700;">pAy</span></span>
</a>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="sidebar-link"><span class="icon">📊</span> Dashboard</a>
            <a href="account.html" class="sidebar-link"><span class="icon">💳</span> Account Overview</a>
            <a href="transactions.html" class="sidebar-link"><span class="icon">💸</span> Transactions</a>
            <a href="transfer.html" class="sidebar-link active"><span class="icon">🔄</span> Transfer Money</a>
            <a href="loans.html" class="sidebar-link"><span class="icon">🏦</span> Loans</a>
            <a href="cards.html" class="sidebar-link"><span class="icon">🃏</span> My Cards</a>
            <hr class="sidebar-divider">
            <a href="profile.html" class="sidebar-link"><span class="icon">👤</span> Profile</a>
            <a href="notifications.html" class="sidebar-link"><span class="icon">🔔</span> Notifications <span
                    class="badge">3</span></a>

        </nav>
    </aside>

    <!-- Main Content -->
    <main class="dashboard-main">
        <header class="dashboard-topbar">
            <div class="topbar-left">
                <button class="menu-toggle" id="menuToggle">☰</button>
                <h1 class="welcome-text">Manage <span class="text-secondary">Beneficiaries</span></h1>
            </div>
            <div class="topbar-right">
                <button class="btn btn-primary" id="addBenBtn">Add New Payee</button>
            </div>
        </header>

        <div class="dashboard-content">
            <!-- Search & Filters -->
            <div class="card mb-lg">
                <div class="table-filters">
                    <input type="text" placeholder="Search by name or account..." class="branch-input"
                        style="margin-bottom: 0;">
                </div>
            </div>

            <!-- Beneficiary List -->
            <div class="beneficiary-grid">
                <div class="card beneficiary-card">
                    <div class="metric-icon bg-primary-soft">AJ</div>
                    <h3>Alice Johnson</h3>
                    <p class="text-muted">Acc: ****3210 | Easy pAy Bank</p>
                    <div class="ben-actions">
                        <a href="transfer.html" class="btn btn-outline btn-full">Transfer</a>
                        <button class="btn btn-outline">Edit</button>
                    </div>
                </div>
                <div class="card beneficiary-card">
                    <div class="metric-icon bg-teal-soft">BS</div>
                    <h3>Bob Smith</h3>
                    <p class="text-muted">Acc: ****2109 | Chase Bank</p>
                    <div class="ben-actions">
                        <a href="transfer.html" class="btn btn-outline btn-full">Transfer</a>
                        <button class="btn btn-outline">Edit</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Add Beneficiary Modal -->
    <div id="benModal" class="modal-overlay" style="display: none;">
        <div class="card modal-card" style="max-width: 500px;">
            <h3>Add New Beneficiary</h3>
            <form class="contact-form text-left" style="margin-top: var(--space-md);">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Account Number</label>
                    <input type="text" placeholder="000123456789">
                </div>
                <div class="form-group">
                    <label>Bank Name</label>
                    <input type="text" placeholder="e.g. HDFC, Chase">
                </div>
                <div class="form-group">
                    <label>IFSC Code</label>
                    <input type="text" placeholder="BANK0001234">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-outline" id="closeBen">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Beneficiary</button>
                </div>
            </form>
        </div>
    </div>

    <script>

function loadUserSession() {
  const user = JSON.parse(localStorage.getItem('bams_user') || 'null');
  if (!user) {
    window.location.href = 'login.html';
    return;
  }
  const firstName = user.name ? user.name.split(' ')[0] : 'User';
  const welcomeEls = document.querySelectorAll('.user-welcome-name, .sidebar-user-name, #welcome-name');
  welcomeEls.forEach(el => el.textContent = firstName);
  const fullNameEls = document.querySelectorAll('.user-full-name, #user-full-name');
  fullNameEls.forEach(el => {
    if (el.tagName === 'INPUT') el.value = user.name || 'Account Holder';
    else el.textContent = user.name || 'Account Holder';
  });
  const emailEls = document.querySelectorAll('.user-email, #user-email');
  emailEls.forEach(el => {
    if (el.tagName === 'INPUT') el.value = user.email || '';
    else el.textContent = user.email || '';
  });
  if (user.picture) {
    const avatarEls = document.querySelectorAll('.user-avatar, #user-avatar');
    avatarEls.forEach(el => { if(el.tagName === 'IMG') el.src = user.picture; });
  }
  const accountNo = user.accountNumber || 'BAMS2026' + Math.floor(1000 + Math.random()*9000);
  const accEls = document.querySelectorAll('.user-account-no, #user-account-no');
  accEls.forEach(el => el.textContent = accountNo);
}
loadUserSession();
</script>
    <script src="js/auth-guard.js"></script>
    <script src="js/app.js"></script>
    <script>
        const addBenBtn = document.getElementById('addBenBtn');
        const benModal = document.getElementById('benModal');
        const closeBen = document.getElementById('closeBen');

        addBenBtn.addEventListener('click', () => benModal.style.display = 'flex');
        closeBen.addEventListener('click', () => benModal.style.display = 'none');

        // Sidebar Toggle
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        menuToggle.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
        });
    </script>
<script src="js/theme.js"></script>
</body>

</html>
