<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw Money | BAMS</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="images/favicon.png" type="image/x-icon">
</head>

<body class="dashboard-body">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="index.html" class="logo-container" style="display:flex;align-items:center;gap:8px;text-decoration:none;">
  <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="36" height="36" rx="8" fill="#0A2342"/>
    <rect x="6" y="20" width="5" height="10" fill="#C9A84C"/>
    <rect x="13" y="14" width="5" height="16" fill="#C9A84C"/>
    <rect x="20" y="8" width="5" height="22" fill="#C9A84C"/>
    <rect x="6" y="18" width="22" height="2" fill="#F0C040"/>
  </svg>
  <span style="font-size:20px;font-weight:700;color:#0A2342;letter-spacing:1px;">BAMS</span>
</a>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="sidebar-link"><span class="icon">📊</span> Dashboard</a>
            <a href="account.html" class="sidebar-link"><span class="icon">💳</span> Account Overview</a>
            <a href="transactions.html" class="sidebar-link"><span class="icon">💸</span> Transactions</a>
            <a href="transfer.html" class="sidebar-link"><span class="icon">🔄</span> Transfer Money</a>
            <a href="deposit.html" class="sidebar-link"><span class="icon">📥</span> Deposit</a>
            <a href="withdraw.html" class="sidebar-link active"><span class="icon">📤</span> Withdraw</a>
            <a href="loans.html" class="sidebar-link"><span class="icon">🏦</span> Loans</a>
            <a href="cards.html" class="sidebar-link"><span class="icon">🃏</span> My Cards</a>
            <hr class="sidebar-divider">
            <a href="profile.html" class="sidebar-link"><span class="icon">👤</span> Profile</a>
            <a href="notifications.html" class="sidebar-link"><span class="icon">🔔</span> Notifications</a>
            <a href="#" onclick="localStorage.removeItem(\'bams_user\');window.location.href=\'index.html\'" class="sidebar-link logout-link"><span class="icon">🚪</span> Logout</a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="dashboard-main">
        <header class="dashboard-topbar">
            <div class="topbar-left">
                <button class="menu-toggle" id="menuToggle">☰</button>
                <h1 class="welcome-text">Withdraw <span class="text-secondary">Funds</span></h1>
            </div>
            <div class="topbar-right">
                <div class="balance-pill danger">
                    <span class="label">Available:</span>
                    <span class="value">$12,450.00</span>
                </div>
            </div>
        </header>

        <div class="dashboard-content">
            <div class="auth-container" style="max-width: 600px; margin: 0 auto;">
                <div class="card p-xl">
                    <h3 class="mb-lg">Withdrawal Request</h3>
                    <form class="contact-form text-left" id="withdrawForm">
                        <div class="form-group">
                            <label>Withdrawal Method</label>
                            <select class="filter-select">
                                <option>ATM (Self)</option>
                                <option>Linked Bank Account</option>
                                <option>Branch Withdrawal</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Amount ($)</label>
                            <input type="number" placeholder="Enter amount" min="10" max="12450" required>
                        </div>
                        <div class="form-group">
                            <label>Transaction Pin</label>
                            <input type="password" placeholder="****" maxlength="4" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-full">Confirm Withdrawal</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script>

function loadUserSession() {
  const user = JSON.parse(localStorage.getItem('bams_user') || 'null');
  if (!user) {
    window.location.href = 'login.html';
    return;
  }
  const firstName = user.name ? user.name.split(' ')[0] : 'User';
  const welcomeEls = document.querySelectorAll('.user-welcome-name, .sidebar-user-name, #welcome-name');
  welcomeEls.forEach(el => el.textContent = firstName);
  const fullNameEls = document.querySelectorAll('.user-full-name, #user-full-name');
  fullNameEls.forEach(el => {
    if (el.tagName === 'INPUT') el.value = user.name || 'Account Holder';
    else el.textContent = user.name || 'Account Holder';
  });
  const emailEls = document.querySelectorAll('.user-email, #user-email');
  emailEls.forEach(el => {
    if (el.tagName === 'INPUT') el.value = user.email || '';
    else el.textContent = user.email || '';
  });
  if (user.picture) {
    const avatarEls = document.querySelectorAll('.user-avatar, #user-avatar');
    avatarEls.forEach(el => { if(el.tagName === 'IMG') el.src = user.picture; });
  }
  const accountNo = user.accountNumber || 'BAMS2026' + Math.floor(1000 + Math.random()*9000);
  const accEls = document.querySelectorAll('.user-account-no, #user-account-no');
  accEls.forEach(el => el.textContent = accountNo);
}
loadUserSession();
</script>
    <script src="js/app.js"></script>
    <script>
        document.getElementById('withdrawForm').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Withdrawal Request Processed! Please visit ATM or collect at branch.');
            location.href = 'dashboard.html';
        });

        // Sidebar Toggle
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        menuToggle.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
        });
    </script>
<script src="js/theme.js"></script>
</body>

</html>
