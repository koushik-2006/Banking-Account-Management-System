<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fund Transfer | BAMS</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="images/favicon.png" type="image/x-icon">
</head>

<body class="dashboard-body">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="index.html" class="logo-container">
                <img src="images/logo.png" alt="BAMS Logo">
                <span>BAMS</span>
            </a>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="sidebar-link"><span class="icon">📊</span> Dashboard</a>
            <a href="account.html" class="sidebar-link"><span class="icon">💳</span> Account Overview</a>
            <a href="transactions.html" class="sidebar-link"><span class="icon">💸</span> Transactions</a>
            <a href="transfer.html" class="sidebar-link active"><span class="icon">🔄</span> Transfer Money</a>
            <a href="loans.html" class="sidebar-link"><span class="icon">🏦</span> Loans</a>
            <a href="cards.html" class="sidebar-link"><span class="icon">🃏</span> My Cards</a>
            <hr class="sidebar-divider">
            <a href="profile.html" class="sidebar-link"><span class="icon">👤</span> Profile</a>
            <a href="notifications.html" class="sidebar-link"><span class="icon">🔔</span> Notifications <span
                    class="badge">3</span></a>
            <a href="login.html" class="sidebar-link logout-link"><span class="icon">🚪</span> Logout</a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="dashboard-main">
        <header class="dashboard-topbar">
            <div class="topbar-left">
                <button class="menu-toggle" id="menuToggle">☰</button>
                <h1 class="welcome-text">Money <span class="text-secondary">Transfer</span></h1>
            </div>
            <div class="topbar-right">
                <a href="beneficiary.html" class="btn btn-outline">Manage Beneficiaries</a>
            </div>
        </header>

        <div class="dashboard-content">
            <div class="card transfer-card">
                <div class="transfer-tabs">
                    <div class="tab-link active" data-mode="bank">Within BAMS</div>
                    <div class="tab-link" data-mode="other">Other Banks</div>
                </div>

                <div class="transfer-form-container">
                    <form id="transferForm" class="contact-form">
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="fromAccount">From Account</label>
                                <select id="fromAccount" class="filter-select">
                                    <option>Premium Savings - *4321 ($12,450.00)</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="transferMode">Transfer Mode</label>
                                <select id="transferMode" class="filter-select">
                                    <option value="IMPS">IMPS (Instant)</option>
                                    <option value="NEFT">NEFT (2-4 hours)</option>
                                    <option value="RTGS">RTGS (Instant > 2 Lakh)</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="beneficiary">Beneficiary</label>
                                <div class="beneficiary-input-group">
                                    <select id="beneficiary" class="filter-select">
                                        <option value="">Select Beneficiary</option>
                                        <option value="9876543210">Alice Johnson (*3210)</option>
                                        <option value="8765432109">Bob Smith (*2109)</option>
                                    </select>
                                    <span class="or-text">OR</span>
                                    <input type="text" id="manualAcc" placeholder="Account Number">
                                </div>
                            </div>
                            <div class="form-group" id="ifscGroup" style="display: none;">
                                <label for="ifscCode">IFSC Code</label>
                                <input type="text" id="ifscCode" placeholder="BAMS0001234">
                            </div>
                            <div class="form-group">
                                <label for="amount">Amount ($)</label>
                                <input type="number" id="amount" placeholder="0.00" required>
                            </div>
                            <div class="form-group">
                                <label for="remarks">Remarks (Optional)</label>
                                <input type="text" id="remarks" placeholder="Rent, Gift, etc.">
                            </div>
                        </div>
                        <div class="transfer-summary mt-xl" id="transferSummary" style="display: none;">
                            <!-- Summary will appear here before final confirmation -->
                        </div>
                        <button type="button" id="confirmBtn" class="btn btn-primary btn-full">Proceed to
                            Transfer</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <!-- OTP Modal (Simulation) -->
    <div id="otpModal" class="modal-overlay" style="display: none;">
        <div class="card modal-card">
            <h3>Verify Transaction</h3>
            <p>An OTP has been sent to your registered mobile number.</p>
            <div class="form-group">
                <input type="text" id="otpInput" placeholder="Enter 6-digit OTP" class="text-center">
            </div>
            <div class="modal-actions">
                <button class="btn btn-outline" id="cancelOtp">Cancel</button>
                <button class="btn btn-primary" id="finalSubmit">Verify & Pay</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        const modeTabs = document.querySelectorAll('.tab-link');
        const ifscGroup = document.getElementById('ifscGroup');
        const confirmBtn = document.getElementById('confirmBtn');
        const otpModal = document.getElementById('otpModal');

        modeTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                modeTabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                ifscGroup.style.display = tab.dataset.mode === 'other' ? 'block' : 'none';
            });
        });

        confirmBtn.addEventListener('click', () => {
            const amount = document.getElementById('amount').value;
            if (!amount || amount <= 0) {
                alert('Please enter a valid amount.');
                return;
            }
            otpModal.style.display = 'flex';
        });

        document.getElementById('cancelOtp').addEventListener('click', () => {
            otpModal.style.display = 'none';
        });

        document.getElementById('finalSubmit').addEventListener('click', () => {
            const otp = document.getElementById('otpInput').value;
            if (otp.length === 6) {
                alert('Transfer Successful! Ref: TXN' + Math.floor(Math.random() * 1000000));
                window.location.href = 'dashboard.html';
            } else {
                alert('Invalid OTP.');
            }
        });
    </script>
</body>

</html>
