<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Easy pAy</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="images/favicon.png" type="image/x-icon">
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
    <header class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo-container" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
  <div style="width:38px;height:38px;border-radius:9px;background:#C9A84C;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect x="2" y="14" width="4" height="6" rx="1" fill="#0A0A0A"/>
      <rect x="9" y="9" width="4" height="11" rx="1" fill="#0A0A0A"/>
      <rect x="16" y="4" width="4" height="16" rx="1" fill="#0A0A0A"/>
      <rect x="2" y="13" width="18" height="1.5" rx="0.5" fill="#0A0A0A" opacity="0.4"/>
    </svg>
  </div>
  <span style="font-size:21px;font-weight:700;font-family:'Georgia',serif;letter-spacing:0.5px;color:#C9A84C;line-height:1;">Easy <span style="color:#FFD700;">pAy</span></span>
</a>
        </div>
    </header>

    <main class="auth-page section-padding">
        <div class="container container-narrow">
            <div class="card login-card">
                <div class="text-center mb-lg">
                    <h1 class="section-title">Welcome Back</h1>
                    <p class="text-muted">Enter your credentials to access your secure account.</p>
                </div>

                <form id="login-form" class="contact-form">
                    <div id="login-message"></div>
                    <div class="form-group">
                        <label>Account Number</label>
                        <input type="text" id="account-number" placeholder="e.g. BAMS2026012345" pattern="Easy pAy[0-9]{10}" />
                        <small style="color:var(--text-secondary)">Your account number was given during registration</small>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="password-group">
                            <input type="password" id="password" name="password" required>
                            <div class="strength-meter" id="strengthMeter"></div>
                        </div>
                        <div class="auth-links">
                            <label><input type="checkbox"> Remember Me</label>
                            <a href="forgot-password.html" id="forgotPassword">Forgot Password?</a>
                        </div>
                    </div>
            </div>

            <!-- Google Sign-In -->
            <div class="divider"><span>OR</span></div>
            <div id="g_id_onload" data-client_id="YOUR_GOOGLE_CLIENT_ID" data-callback="handleGoogleLogin"
                data-auto_prompt="false"></div>
            <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline" data-text="signin_with"
                data-shape="rectangular" data-logo_alignment="left" data-width="100%"></div>
            <br>

            <button type="submit" id="login-btn" class="btn btn-primary btn-full">Login to My Account</button>
            <div class="text-center mt-xl">
                <p>Don't have an account? <a href="register.html" class="text-link">Open one today</a></p>
            </div>
            </form>
        </div>
        </div>
    </main>

    <!-- Forgot Password Modal (Simplified) -->
    <div id="forgotModal" class="modal" style="display: none;">
        <!-- Modal content... -->
    </div>

    <footer class="footer">
        <div class="container text-center">
            <p>&copy; 2026 Easy pAy. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
    <script>
        // Google Sign-In Handler
        function handleGoogleLogin(response) {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            localStorage.setItem('bams_user', JSON.stringify({
                name: payload.name,
                email: payload.email,
                picture: payload.picture,
                loginType: 'google'
            }));
            localStorage.setItem('bams_token', 'google_verified_session');
            window.location.href = 'dashboard.html';
        }

        // Password Strength Logic
        const passwordInput = document.getElementById('password');
        const strengthMeter = document.getElementById('strengthMeter');

        passwordInput.addEventListener('input', () => {
            const val = passwordInput.value;
            strengthMeter.className = 'strength-meter';
            if (val.length > 0) {
                if (val.length < 6) strengthMeter.classList.add('strength-weak');
                else if (val.length < 10) strengthMeter.classList.add('strength-medium');
                else strengthMeter.classList.add('strength-strong');
            }
        });

        document.getElementById('login-form').addEventListener('submit', async function(e) {
          e.preventDefault();
          const accountNumber = document.getElementById('account-number').value.trim();
          const password = document.getElementById('password').value;
          const btn = document.getElementById('login-btn');
          const msgBox = document.getElementById('login-message');

          if (!accountNumber) { showMsg('error', 'Please enter your account number.'); return; }
          if (!password) { showMsg('error', 'Please enter your password.'); return; }

          btn.disabled = true;
          btn.textContent = 'Signing in...';
          msgBox.className = 'msg-box msg-info';
          msgBox.textContent = 'Connecting to bank server...';
          msgBox.style.display = 'block';

          try {
            const res = await fetch('http://localhost:8080/api/auth/login', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ accountNumber, password })
            });
            const data = await res.json();

            if (data.success) {
              showMsg('success', '✓ ' + data.message);
              localStorage.setItem('bams_user', JSON.stringify({
                name: data.fullName,
                email: data.email,
                accountNumber: data.accountNumber,
                accountType: data.accountType,
                balance: data.balance,
                token: data.token
              }));
              setTimeout(() => {
                  const redirect = localStorage.getItem('redirect_after_login');
                  if (redirect) {
                      localStorage.removeItem('redirect_after_login');
                      window.location.href = redirect;
                  } else {
                      window.location.href = 'dashboard.html';
                  }
              }, 1200);
            } else {
              showMsg('error', '✗ ' + data.message);
              btn.disabled = false;
              btn.textContent = 'Login';
            }
          } catch (err) {
            showMsg('error', '⚠ Cannot connect to bank server. Make sure the backend is running on port 8080.');
            btn.disabled = false;
            btn.textContent = 'Login';
          }
        });

        function showMsg(type, text) {
          const box = document.getElementById('login-message');
          box.textContent = text;
          box.style.display = 'block';
          box.className = 'msg-box msg-' + type;
        }

        document.getElementById('forgotPassword').addEventListener('click', (e) => {
            e.preventDefault();
            const email = prompt('Enter your registered email address:');
            if (email) {
                alert('OTP sent to ' + email + '. (Simulation)');
                const otp = prompt('Enter 4-digit OTP:');
                if (otp) {
                    const newPass = prompt('Enter new password:');
                    if (newPass) alert('Password updated successfully!');
                }
            }
        });
    </script>
<script src="js/theme.js"></script>
</body>

</html>
