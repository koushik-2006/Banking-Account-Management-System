<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | BAMS</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="images/favicon.png" type="image/x-icon">
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
    <header class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo-container" style="display:flex;align-items:center;gap:8px;text-decoration:none;">
  <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="36" height="36" rx="8" fill="#0A2342"/>
    <rect x="6" y="20" width="5" height="10" fill="#C9A84C"/>
    <rect x="13" y="14" width="5" height="16" fill="#C9A84C"/>
    <rect x="20" y="8" width="5" height="22" fill="#C9A84C"/>
    <rect x="6" y="18" width="22" height="2" fill="#F0C040"/>
  </svg>
  <span style="font-size:20px;font-weight:700;color:#0A2342;letter-spacing:1px;">BAMS</span>
</a>
        </div>
    </header>

    <main class="auth-page section-padding">
        <div class="container container-narrow">
            <div class="card login-card">
                <div class="text-center mb-lg">
                    <h1 class="section-title">Welcome Back</h1>
                    <p class="text-muted">Enter your credentials to access your secure account.</p>
                </div>

                <form id="loginForm" class="contact-form">
                    <div class="form-group">
                        <label for="username">Account Number / Username</label>
                        <input type="text" id="username" name="username" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="password-group">
                            <input type="password" id="password" name="password" required>
                            <div class="strength-meter" id="strengthMeter"></div>
                        </div>
                        <div class="auth-links">
                            <label><input type="checkbox"> Remember Me</label>
                            <a href="forgot-password.html" id="forgotPassword">Forgot Password?</a>
                        </div>
                    </div>
            </div>

            <!-- Google Sign-In -->
            <div class="divider"><span>OR</span></div>
            <div id="g_id_onload" data-client_id="YOUR_GOOGLE_CLIENT_ID" data-callback="handleGoogleLogin"
                data-auto_prompt="false"></div>
            <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline" data-text="signin_with"
                data-shape="rectangular" data-logo_alignment="left" data-width="100%"></div>
            <br>

            <button type="submit" class="btn btn-primary btn-full">Login to My Account</button>
            <div class="text-center mt-xl">
                <p>Don't have an account? <a href="register.html" class="text-link">Open one today</a></p>
            </div>
            </form>
        </div>
        </div>
    </main>

    <!-- Forgot Password Modal (Simplified) -->
    <div id="forgotModal" class="modal" style="display: none;">
        <!-- Modal content... -->
    </div>

    <footer class="footer">
        <div class="container text-center">
            <p>&copy; 2026 Banking Account Management System. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
    <script>
        // Google Sign-In Handler
        function handleGoogleLogin(response) {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            localStorage.setItem('bams_user', JSON.stringify({
                name: payload.name,
                email: payload.email,
                picture: payload.picture,
                loginType: 'google'
            }));
            localStorage.setItem('bams_token', 'google_verified_session');
            window.location.href = 'dashboard.html';
        }

        // Password Strength Logic
        const passwordInput = document.getElementById('password');
        const strengthMeter = document.getElementById('strengthMeter');

        passwordInput.addEventListener('input', () => {
            const val = passwordInput.value;
            strengthMeter.className = 'strength-meter';
            if (val.length > 0) {
                if (val.length < 6) strengthMeter.classList.add('strength-weak');
                else if (val.length < 10) strengthMeter.classList.add('strength-medium');
                else strengthMeter.classList.add('strength-strong');
            }
        });

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            // Simulate JWT Login
            localStorage.setItem('bams_token', 'simulated_jwt_token');
            alert('Login Successful!');
            window.location.href = 'dashboard.html';
        });

        document.getElementById('forgotPassword').addEventListener('click', (e) => {
            e.preventDefault();
            const email = prompt('Enter your registered email address:');
            if (email) {
                alert('OTP sent to ' + email + '. (Simulation)');
                const otp = prompt('Enter 4-digit OTP:');
                if (otp) {
                    const newPass = prompt('Enter new password:');
                    if (newPass) alert('Password updated successfully!');
                }
            }
        });
    </script>
<script src="js/theme.js"></script>
</body>

</html>
