<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Management | Easy pAy</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="images/favicon.png" type="image/x-icon">
</head>

<body class="dashboard-body">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="index.html" class="logo-container" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
  <div style="width:38px;height:38px;border-radius:9px;background:#C9A84C;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect x="2" y="14" width="4" height="6" rx="1" fill="#0A0A0A"/>
      <rect x="9" y="9" width="4" height="11" rx="1" fill="#0A0A0A"/>
      <rect x="16" y="4" width="4" height="16" rx="1" fill="#0A0A0A"/>
      <rect x="2" y="13" width="18" height="1.5" rx="0.5" fill="#0A0A0A" opacity="0.4"/>
    </svg>
  </div>
  <span style="font-size:21px;font-weight:700;font-family:'Georgia',serif;letter-spacing:0.5px;color:#C9A84C;line-height:1;">Easy <span style="color:#FFD700;">pAy</span></span>
</a>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="sidebar-link"><span class="icon">📊</span> Dashboard</a>
            <a href="account.html" class="sidebar-link"><span class="icon">💳</span> Account Overview</a>
            <a href="transactions.html" class="sidebar-link"><span class="icon">💸</span> Transactions</a>
            <a href="transfer.html" class="sidebar-link"><span class="icon">🔄</span> Transfer Money</a>
            <a href="loans.html" class="sidebar-link"><span class="icon">🏦</span> Loans</a>
            <a href="cards.html" class="sidebar-link"><span class="icon">🃏</span> My Cards</a>
            <hr class="sidebar-divider">
            <a href="profile.html" class="sidebar-link active"><span class="icon">👤</span> Profile</a>
            <a href="notifications.html" class="sidebar-link"><span class="icon">🔔</span> Notifications <span
                    class="badge">3</span></a>
            <a href="#" onclick="localStorage.removeItem('bams_user'); window.location.href='index.html';" class="sidebar-link logout-link"><span class="icon">🚪</span> Logout</a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="dashboard-main">
        <header class="dashboard-topbar">
            <div class="topbar-left">
                <button class="menu-toggle" id="menuToggle">☰</button>
                <h1 class="welcome-text">My <span class="text-secondary">Profile</span></h1>
            </div>
            <div class="topbar-right">
                <button class="btn btn-primary">Save Changes</button>
            </div>
        </header>

        <div class="dashboard-content">
            <div class="card profile-card">
                <div class="profile-header">
                    <img src="images/favicon.png" alt="User Avatar" class="profile-avatar-large">
                    <h2 class="user-full-name"></h2>
                    <p class="text-muted">Member since Jan 2026</p>
                </div>

                <div class="profile-tabs">
                    <div class="tab-link active" data-tab="personal">Personal Info</div>
                    <div class="tab-link" data-tab="security">Security</div>
                    <div class="tab-link" data-tab="preferences">Preferences</div>
                </div>

                <div class="tab-content" id="personal">
                    <form class="form-grid">
                        <div class="form-group">
                            <label>First Name</label>
                            <input type="text" class="user-full-name" readonly>
                        </div>
                        <div class="form-group">
                            <label>Last Name</label>
                            <input type="text" value="User" readonly>
                        </div>
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" class="user-email">
                        </div>
                        <div class="form-group">
                            <label>Phone Number</label>
                            <input type="tel" value="+1 234 567 890">
                        </div>
                        <div class="form-group" style="grid-column: span 2;">
                            <label>Residential Address</label>
                            <textarea rows="2">123 Banking Street, Financial District, New York, NY 10001</textarea>
                        </div>
                    </form>
                </div>

                <div class="tab-content" id="security" style="display: none;">
                    <form class="form-grid">
                        <div class="form-group">
                            <label>Current Password</label>
                            <input type="password">
                        </div>
                        <div class="form-group">
                            <label>New Password</label>
                            <input type="password">
                        </div>
                        <div class="form-group" style="grid-column: span 2;">
                            <label><input type="checkbox" checked> Enable Two-Factor Authentication (2FA)</label>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script>

function loadUserSession() {
  const user = JSON.parse(localStorage.getItem('bams_user') || 'null');
  if (!user) {
    window.location.href = 'login.html';
    return;
  }
  const firstName = user.name ? user.name.split(' ')[0] : 'User';
  const welcomeEls = document.querySelectorAll('.user-welcome-name, .sidebar-user-name, #welcome-name');
  welcomeEls.forEach(el => el.textContent = firstName);
  const fullNameEls = document.querySelectorAll('.user-full-name, #user-full-name');
  fullNameEls.forEach(el => {
    if (el.tagName === 'INPUT') el.value = user.name || 'Account Holder';
    else el.textContent = user.name || 'Account Holder';
  });
  const emailEls = document.querySelectorAll('.user-email, #user-email');
  emailEls.forEach(el => {
    if (el.tagName === 'INPUT') el.value = user.email || '';
    else el.textContent = user.email || '';
  });
  if (user.picture) {
    const avatarEls = document.querySelectorAll('.user-avatar, #user-avatar');
    avatarEls.forEach(el => { if(el.tagName === 'IMG') el.src = user.picture; });
  }
  const accountNo = user.accountNumber || 'BAMS2026' + Math.floor(1000 + Math.random()*9000);
  const accEls = document.querySelectorAll('.user-account-no, #user-account-no');
  accEls.forEach(el => el.textContent = accountNo);
}
loadUserSession();
</script>
    <script src="js/auth-guard.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Tab switching logic
        const tabs = document.querySelectorAll('.tab-link');
        const contents = document.querySelectorAll('.tab-content');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');

                const targetId = tab.getAttribute('data-tab');
                contents.forEach(content => {
                    content.style.display = content.id === targetId ? 'block' : 'none';
                });
            });
        });

        // Sidebar Toggle
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        menuToggle.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
        });
    </script>
<script src="js/theme.js"></script>
</body>

</html>
