<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Approvals | Easy pAy Admin</title>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="shortcut icon" href="../images/favicon.png" type="image/x-icon">
</head>

<body class="dashboard-body">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="../index.html" class="logo-container" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
  <div style="width:38px;height:38px;border-radius:9px;background:#C9A84C;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect x="2" y="14" width="4" height="6" rx="1" fill="#0A0A0A"/>
      <rect x="9" y="9" width="4" height="11" rx="1" fill="#0A0A0A"/>
      <rect x="16" y="4" width="4" height="16" rx="1" fill="#0A0A0A"/>
      <rect x="2" y="13" width="18" height="1.5" rx="0.5" fill="#0A0A0A" opacity="0.4"/>
    </svg>
  </div>
  <span style="font-size:21px;font-weight:700;font-family:'Georgia',serif;letter-spacing:0.5px;color:#C9A84C;line-height:1;">Easy <span style="color:#FFD700;">pAy</span></span>
</a>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html" class="sidebar-link"><span class="icon">📊</span> Admin Home</a>
            <a href="customers.html" class="sidebar-link"><span class="icon">👥</span> Customers</a>
            <a href="loans.html" class="sidebar-link active"><span class="icon">🏦</span> Loan Processing</a>
            <a href="transactions.html" class="sidebar-link"><span class="icon">🔍</span> Global Audit</a>
            <a href="reports.html" class="sidebar-link"><span class="icon">📑</span> Business Reports</a>
            <hr class="sidebar-divider">
            <a href="../login.html" class="sidebar-link logout-link"><span class="icon">🚪</span> Exit Admin</a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="dashboard-main">
        <header class="dashboard-topbar">
            <div class="topbar-left">
                <h1 class="welcome-text">Loan <span class="text-secondary">Queue</span></h1>
            </div>
            <div class="topbar-right">
                <span class="badge" style="background-color: var(--warning);">18 Pending</span>
            </div>
        </header>

        <div class="dashboard-content">
            <!-- Loan Queue -->
            <div class="card">
                <div class="table-responsive">
                    <table class="activity-table">
                        <thead>
                            <tr>
                                <th>Applicant</th>
                                <th>Type</th>
                                <th>Amount</th>
                                <th>Tenure</th>
                                <th>Score</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>John Doe</td>
                                <td>Personal</td>
                                <td>$25,000</td>
                                <td>3 Years</td>
                                <td><span class="status-pill success">740 (Excl)</span></td>
                                <td>
                                    <button class="btn btn-primary btn-sm"
                                        onclick="alert('Loan Approved!')">Approve</button>
                                    <button class="btn btn-outline btn-sm text-danger">Reject</button>
                                </td>
                            </tr>
                            <tr>
                                <td>Alice Johnson</td>
                                <td>Car Loan</td>
                                <td>$40,000</td>
                                <td>5 Years</td>
                                <td><span class="status-pill warning">620 (Fair)</span></td>
                                <td>
                                    <button class="btn btn-primary btn-sm">Process</button>
                                    <button class="btn btn-outline btn-sm text-danger">Reject</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/app.js"></script>
<script src="../js/theme.js"></script>
</body>

</html>
