<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Reports | Easy pAy Admin</title>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="shortcut icon" href="../images/favicon.png" type="image/x-icon">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="dashboard-body">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="../index.html" class="logo-container" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
  <div style="width:38px;height:38px;border-radius:9px;background:#C9A84C;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect x="2" y="14" width="4" height="6" rx="1" fill="#0A0A0A"/>
      <rect x="9" y="9" width="4" height="11" rx="1" fill="#0A0A0A"/>
      <rect x="16" y="4" width="4" height="16" rx="1" fill="#0A0A0A"/>
      <rect x="2" y="13" width="18" height="1.5" rx="0.5" fill="#0A0A0A" opacity="0.4"/>
    </svg>
  </div>
  <span style="font-size:21px;font-weight:700;font-family:'Georgia',serif;letter-spacing:0.5px;color:#C9A84C;line-height:1;">Easy <span style="color:#FFD700;">pAy</span></span>
</a>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html" class="sidebar-link"><span class="icon">📊</span> Admin Home</a>
            <a href="customers.html" class="sidebar-link"><span class="icon">👥</span> Customers</a>
            <a href="loans.html" class="sidebar-link"><span class="icon">🏦</span> Loan Processing</a>
            <a href="transactions.html" class="sidebar-link"><span class="icon">🔍</span> Global Audit</a>
            <a href="reports.html" class="sidebar-link active"><span class="icon">📑</span> Business Reports</a>
            <hr class="sidebar-divider">
            <a href="../login.html" class="sidebar-link logout-link"><span class="icon">🚪</span> Exit Admin</a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="dashboard-main">
        <header class="dashboard-topbar">
            <div class="topbar-left">
                <h1 class="welcome-text">Business <span class="accent-underline">Intelligence</span></h1>
            </div>
            <div class="topbar-right">
                <button class="btn btn-primary">Generate Master Report</button>
            </div>
        </header>

        <div class="dashboard-content">
            <!-- Visual Reports -->
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:30px; margin-bottom:30px;">
                <div class="card" style="padding:0; overflow:hidden;">
                    <img src="../images/stats_dashboard.png" alt="Fintech Statistics" style="width:100%; height:250px; object-fit:cover;">
                </div>
                <div class="card" style="padding:0; overflow:hidden;">
                    <img src="../images/team_analytics.png" alt="Team Analytics" style="width:100%; height:250px; object-fit:cover;">
                </div>
            </div>
            <!-- Report Cards -->
            <div class="metrics-grid mb-lg">
                <div class="card p-lg text-center">
                    <h4>Monthly Transactions</h4>
                    <p class="text-muted mb-md">Full audit trail in PDF</p>
                    <button class="btn btn-outline btn-sm">Download</button>
                </div>
                <div class="card p-lg text-center">
                    <h4>Loan Disbursements</h4>
                    <p class="text-muted mb-md">Q2 2026 Summary</p>
                    <button class="btn btn-outline btn-sm">Download</button>
                </div>
                <div class="card p-lg text-center">
                    <h4>Customer Growth</h4>
                    <p class="text-muted mb-md">Acquisition analytics</p>
                    <button class="btn btn-outline btn-sm">Download</button>
                </div>
            </div>

            <!-- Charts -->
            <div class="dashboard-grid">
                <div class="card">
                    <h3 class="card-title">Revenue by Product</h3>
                    <div class="chart-container">
                        <canvas id="revenuePieChart"></canvas>
                    </div>
                </div>
                <div class="card">
                    <h3 class="card-title">Daily Transaction Volume</h3>
                    <div class="chart-container">
                        <canvas id="dailyVolumeChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/app.js"></script>
    <script>
        // Revenue Pie
        new Chart(document.getElementById('revenuePieChart').getContext('2d'), {
            type: 'doughnut',
            data: {
                labels: ['Savings', 'Loans', 'Cards', 'Investments'],
                datasets: [{
                    data: [45, 30, 15, 10],
                    backgroundColor: ['#0A2342', '#C9A84C', '#1B3D6E', '#F0C040']
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        // Daily Volume Bar
        new Chart(document.getElementById('dailyVolumeChart').getContext('2d'), {
            type: 'line',
            data: {
                labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                datasets: [{
                    label: 'Volume ($)',
                    data: [12000, 15000, 18000, 14000, 22000, 8000, 6000],
                    borderColor: '#0A2342',
                    fill: true,
                    backgroundColor: 'rgba(10, 35, 66, 0.1)'
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    </script>
<script src="../js/theme.js"></script>
</body>

</html>
